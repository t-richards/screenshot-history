name: build

on:
  push:
    branches: [master]
    tags: ['*.*.*']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build application
        run: dotnet build screenshot-history.slnx -c Release -p:Version=${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '0.0.0' }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --latest screenshot-history/bin/Release/screenshot-history.exe
